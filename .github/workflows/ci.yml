name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pyyaml

      - name: Run plugin structure tests
        run: |
          python -m pytest tests/ -v --tb=short

      - name: Verify plugin.yaml
        run: |
          python -c "
          import yaml
          with open('plugin.yaml') as f:
              data = yaml.safe_load(f)
          required = ['name', 'version', 'description', 'kind']
          for key in required:
              assert key in data, f'Missing required key: {key}'
          print(f'Plugin: {data[\"name\"]} v{data[\"version\"]}')
          "

      - name: Verify Python syntax
        run: |
          python -m py_compile __init__.py
          echo "Syntax OK"

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install linters
        run: |
          pip install ruff

      - name: Run ruff
        run: |
          ruff check __init__.py || true
          ruff format --check __init__.py || true

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify documentation structure
        run: |
          test -f docs/README.md || exit 1
          test -f docs/guides/quickstart.md || exit 1
          test -f docs/guides/routing-policy.md || exit 1
          test -f docs/guides/lanes.md || exit 1
          test -f docs/api/tools.md || exit 1
          test -f docs/examples/feature-implementation.md || exit 1
          echo "Documentation structure OK"

      - name: Check for broken internal links
        run: |
          # Simple check that referenced files exist
          grep -o 'docs/[a-zA-Z0-9/._-]*\.md' README.md docs/README.md | sort -u | while read -r path; do
            if [ ! -f "$path" ]; then
              echo "Broken link: $path"
              exit 1
            fi
          done
          echo "Link check OK"
